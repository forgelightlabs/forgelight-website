<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgelight Labs | Pre-Call Questionnaire</title>
  <meta name="description" content="Help us understand your firm before our conversation." />
  <link rel="icon" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAFAFA;color:#1C1C1F;min-height:100vh;-webkit-font-smoothing:antialiased}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .4s ease-out}
    textarea::-webkit-scrollbar{width:5px}textarea::-webkit-scrollbar-thumb{background:#D4D4D8;border-radius:3px}
    select option{background:#fff;color:#1C1C1F}
    ::selection{background:rgba(232,228,221,0.5)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState}=React;
    const CALENDLY_URL="https://calendly.com/forgelightlabs/discovery";

    // Inline SVG logo so it works everywhere — no external file dependency
    function Logo({height=48}) {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={height * 5} height={height} viewBox="0 0 500 100" style={{display:'block',marginBottom:36}}>
          <defs>
            <style>{`@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap');.wm{font-family:'Cinzel',Georgia,serif;font-size:28px;font-weight:600;fill:#1C1C1F}`}</style>
          </defs>
          <g transform="translate(24, 16)">
            <circle cx="32" cy="32" r="27" fill="none" stroke="#1C1C1F" strokeWidth="3"/>
            <path d="M32 24L34.2 17.2L29.9 11.1L32 7" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M37.7 26.3L44.1 23.1L45.3 15.7L49.7 14.3" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M40 32L46.8 34.2L52.9 29.9L57 32" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M37.7 37.7L40.9 44.1L48.3 45.3L49.7 49.7" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M32 40L29.8 46.8L34.1 52.9L32 57" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M26.3 37.7L19.9 40.9L18.7 48.3L14.3 49.7" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M24 32L17.2 29.8L11.1 34.1L7 32" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M26.3 26.3L23.1 19.9L15.7 18.7L14.3 14.3" stroke="#1C1C1F" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <circle cx="32" cy="32" r="5.5" fill="#1C1C1F"/>
          </g>
          <text x="106" y="58" className="wm" style={{fontFamily:"'Cinzel',Georgia,serif",fontSize:28,fontWeight:600,fill:'#1C1C1F'}}>Forgelight Labs</text>
        </svg>
      );
    }

    const QS=[
      {id:1,label:"What\u2019s the biggest challenge your firm is facing right now when it comes to generating new clients?",hint:"Be specific \u2014 there are no wrong answers."},
      {id:2,label:"What have you already tried to fix this?",hint:"Networking events, marketing agencies, LinkedIn, referral programs, etc."},
      {id:3,label:"If we don\u2019t end up working together, what\u2019s your Plan B for growing your practice this year?",hint:"We ask this to understand your situation honestly, not to pressure you."},
      {id:4,label:"Describe your firm 6 months from now if you had a reliable system generating 5\u201310 qualified conversations every month.",hint:"Revenue, team, clients, peace of mind \u2014 whatever matters most."},
      {id:5,label:"What does your firm specialize in?",hint:"Tax advisory, fractional CFO, audit, M&A consulting, wealth management, litigation, etc."},
    ];
    const FF=[
      {id:"firm_name",label:"Firm Name",type:"text",ph:"e.g., Smith & Associates",req:true},
      {id:"your_name",label:"Your Name",type:"text",ph:"e.g., John Smith",req:true},
      {id:"your_title",label:"Your Title",type:"text",ph:"e.g., Managing Partner"},
      {id:"email",label:"Email",type:"email",ph:"john@smithadvisory.com",req:true},
      {id:"firm_size",label:"Firm Size",type:"select",opts:["1\u20135 people","6\u201315 people","16\u201350 people","51\u2013100 people","100+"]},
    ];
    function Btn({onClick,disabled,sec,children}){
      const b={border:"none",fontSize:14,fontWeight:600,borderRadius:6,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",transition:"all .2s"};
      const st=sec
        ?{...b,background:"transparent",border:"1px solid #D4D4D8",color:"#52525B",padding:"11px 22px"}
        :{...b,background:disabled?"#D4D4D8":"#1C1C1F",color:disabled?"#A1A1AA":"#FAFAFA",padding:"13px 32px"};
      return <button onClick={onClick} disabled={disabled} style={st}>{children}</button>;
    }
    function App(){
      const[step,setStep]=useState(0);
      const[ans,setAns]=useState({});
      const[fi,setFi]=useState({});
      const[done,setDone]=useState(false);
      const tot=QS.length+2;
      const prog=step===0?0:Math.min((step/(tot-1))*100,100);
      const ok=()=>{
        if(step===0)return true;
        if(step>=1&&step<=QS.length)return(ans[QS[step-1].id]||"").trim().length>10;
        if(step===QS.length+1)return fi.firm_name&&fi.your_name&&fi.email;
        return false;
      };
      const submit=()=>{
        const p={firm:fi,answers:QS.map(q=>({question:q.label,answer:ans[q.id]||""})),submitted_at:new Date().toISOString(),source:location.href};
        try{navigator.sendBeacon&&navigator.sendBeacon("https://hooks.zapier.com/hooks/catch/placeholder",JSON.stringify(p))}catch(e){}
        try{const e=JSON.parse(localStorage.getItem("fl_q")||"[]");e.push(p);localStorage.setItem("fl_q",JSON.stringify(e))}catch(e){}
        setDone(true);setStep(tot);
      };
      const is={width:"100%",background:"#fff",border:"1px solid #E4E4E7",borderRadius:8,padding:"12px 14px",fontSize:14,color:"#1C1C1F",fontFamily:"inherit",outline:"none",boxSizing:"border-box",transition:"border-color .2s"};
      return(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 20px"}}>
          {step>0&&step<tot&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:"#E4E4E7",zIndex:50}}><div style={{height:"100%",width:`${prog}%`,background:"#1C1C1F",transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/></div>}
          <div style={{maxWidth:560,width:"100%",paddingTop:step===0?72:56,paddingBottom:60}}>
            {step===0&&(
              <div className="fade-up">
                <Logo height={48} />
                <h1 style={{fontSize:28,lineHeight:1.3,fontWeight:700,margin:"0 0 14px 0",color:"#1C1C1F"}}>Before we talk, help us understand your firm.</h1>
                <p style={{fontSize:15,lineHeight:1.7,color:"#52525B",margin:"0 0 24px 0"}}>This takes about 3 minutes. Your answers help us determine whether our system is a genuine fit &mdash; and if it is, we'll come to the call with a specific plan built around your situation.</p>
                <p style={{fontSize:13,lineHeight:1.6,color:"#A1A1AA",margin:"0 0 36px 0"}}>No wasted time. Just an honest conversation informed by what you tell us here.</p>
                <Btn onClick={()=>setStep(1)}>Get started &rarr;</Btn>
              </div>
            )}
            {step>=1&&step<=QS.length&&(
              <div key={step} className="fade-up">
                <div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:12,letterSpacing:1}}>{step} / {QS.length}</div>
                <h2 style={{fontSize:20,lineHeight:1.4,fontWeight:600,margin:"0 0 8px 0",color:"#1C1C1F"}}>{QS[step-1].label}</h2>
                <p style={{fontSize:13,color:"#A1A1AA",margin:"0 0 20px 0"}}>{QS[step-1].hint}</p>
                <textarea value={ans[QS[step-1].id]||""} onChange={e=>setAns(p=>({...p,[QS[step-1].id]:e.target.value}))} placeholder="Type your answer here..." autoFocus
                  style={{...is,minHeight:130,resize:"vertical",fontSize:15,lineHeight:1.6,padding:16,borderRadius:8}}
                  onFocus={e=>e.target.style.borderColor="#1C1C1F"} onBlur={e=>e.target.style.borderColor="#E4E4E7"}/>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
                  <Btn sec onClick={()=>setStep(step-1)}>&larr; Back</Btn>
                  <Btn onClick={()=>setStep(step+1)} disabled={!ok()}>Continue &rarr;</Btn>
                </div>
              </div>
            )}
            {step===QS.length+1&&(
              <div className="fade-up">
                <div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:12,letterSpacing:1}}>LAST STEP</div>
                <h2 style={{fontSize:20,lineHeight:1.4,fontWeight:600,margin:"0 0 8px 0",color:"#1C1C1F"}}>Tell us about your firm.</h2>
                <p style={{fontSize:13,color:"#A1A1AA",margin:"0 0 20px 0"}}>So we can come prepared.</p>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {FF.map(f=>(
                    <div key={f.id}>
                      <label style={{fontSize:12,fontWeight:500,color:"#52525B",display:"block",marginBottom:5}}>{f.label}</label>
                      {f.type==="select"?(
                        <select value={fi[f.id]||""} onChange={e=>setFi(p=>({...p,[f.id]:e.target.value}))} style={{...is,appearance:"none"}}>
                          <option value="">Select...</option>
                          {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
                        </select>
                      ):(
                        <input type={f.type} value={fi[f.id]||""} onChange={e=>setFi(p=>({...p,[f.id]:e.target.value}))} placeholder={f.ph} style={is}
                          onFocus={e=>e.target.style.borderColor="#1C1C1F"} onBlur={e=>e.target.style.borderColor="#E4E4E7"}/>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
                  <Btn sec onClick={()=>setStep(step-1)}>&larr; Back</Btn>
                  <Btn onClick={submit} disabled={!ok()}>Submit & Book a Call &rarr;</Btn>
                </div>
              </div>
            )}
            {done&&step===tot&&(
              <div className="fade-up" style={{textAlign:"center",paddingTop:40}}>
                <div style={{width:52,height:52,borderRadius:"50%",background:"#1C1C1F",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",fontSize:0}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FAFAFA" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                <h2 style={{fontSize:24,fontWeight:700,margin:"0 0 12px 0",color:"#1C1C1F"}}>Thank you{fi.your_name?`, ${fi.your_name.split(" ")[0]}`:""}</h2>
                <p style={{fontSize:15,lineHeight:1.7,color:"#52525B",margin:"0 0 28px 0"}}>We&rsquo;ve received your answers. When we speak, we'll have a specific assessment for{fi.firm_name?` ${fi.firm_name}`:` your firm`}.</p>
                <div style={{background:"#fff",border:"1px solid #E4E4E7",borderRadius:8,padding:24,marginBottom:24,textAlign:"left"}}>
                  <p style={{fontSize:11,fontWeight:600,color:"#64748B",margin:"0 0 6px 0",letterSpacing:1.5}}>NEXT STEP</p>
                  <p style={{fontSize:14,lineHeight:1.6,color:"#52525B",margin:0}}>Book a 15-minute call with Felix. He'll walk through your answers and give you an honest assessment.</p>
                </div>
                <a href={CALENDLY_URL} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",background:"#1C1C1F",color:"#FAFAFA",padding:"14px 40px",fontSize:14,fontWeight:600,borderRadius:6,fontFamily:"inherit",textDecoration:"none"}}>Book Your 15-Minute Call &rarr;</a>
                <p style={{fontSize:11,color:"#A1A1AA",marginTop:14}}>Pick any time that works.</p>
              </div>
            )}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
